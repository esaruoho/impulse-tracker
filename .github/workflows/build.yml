name: Build IT.EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install DOSBox-X
        run: |
          sudo apt-get update
          sudo apt-get install -y dosbox-x unzip xvfb

      - name: Reassemble TASM toolchain from chunked secrets
        env:
          C01: ${{ secrets.TASM_TOOLCHAIN_B64_01 }}
          C02: ${{ secrets.TASM_TOOLCHAIN_B64_02 }}
          C03: ${{ secrets.TASM_TOOLCHAIN_B64_03 }}
          C04: ${{ secrets.TASM_TOOLCHAIN_B64_04 }}
          C05: ${{ secrets.TASM_TOOLCHAIN_B64_05 }}
          C06: ${{ secrets.TASM_TOOLCHAIN_B64_06 }}
          C07: ${{ secrets.TASM_TOOLCHAIN_B64_07 }}
          C08: ${{ secrets.TASM_TOOLCHAIN_B64_08 }}
          C09: ${{ secrets.TASM_TOOLCHAIN_B64_09 }}
          C10: ${{ secrets.TASM_TOOLCHAIN_B64_10 }}
          C11: ${{ secrets.TASM_TOOLCHAIN_B64_11 }}
          C12: ${{ secrets.TASM_TOOLCHAIN_B64_12 }}
          C13: ${{ secrets.TASM_TOOLCHAIN_B64_13 }}
        run: |
          if [ -z "$C01" ]; then
            echo "::error::Repo secrets TASM_TOOLCHAIN_B64_01..13 are not set."
            echo "::error::See README.md (TASM toolchain section) for setup."
            exit 1
          fi
          mkdir -p tools
          {
            printf '%s' "$C01"
            printf '%s' "$C02"
            printf '%s' "$C03"
            printf '%s' "$C04"
            printf '%s' "$C05"
            printf '%s' "$C06"
            printf '%s' "$C07"
            printf '%s' "$C08"
            printf '%s' "$C09"
            printf '%s' "$C10"
            printf '%s' "$C11"
            printf '%s' "$C12"
            printf '%s' "$C13"
          } | base64 -d > tools/tasm-toolchain.zip
          unzip -o tools/tasm-toolchain.zip -d tools/
          rm tools/tasm-toolchain.zip
          ls -la tools/

      - name: Write DOSBox-X build script
        run: |
          cat > build.conf <<EOF
          [sdl]
          autolock=false
          [dosbox]
          machine=svga_s3
          memsize=64
          [cpu]
          cycles=max
          [dos]
          ver=6.22
          xms=true
          ems=true
          lfn=true
          [autoexec]
          mount c $GITHUB_WORKSPACE
          mount t $GITHUB_WORKSPACE/tools
          set PATH=T:\;%PATH%
          c:
          make -f MAKEFILE.MAK > C:\MAKE.LOG
          echo IT_DONE ec=%ERRORLEVEL% > C:\BUILD_ST.TXT
          cd SoundDrivers
          call BUILDALL.BAT > C:\DRV_SND.LOG
          cd ..
          cd Network
          call BUILDALL.BAT > C:\DRV_NET.LOG
          cd ..
          echo ALL_DONE >> C:\BUILD_ST.TXT
          exit
          EOF

      - name: Build IT.EXE + drivers in DOSBox-X
        run: |
          # Need a virtual display because dosbox-x is SDL2-linked even with -nogui
          xvfb-run -a dosbox-x -conf build.conf -fastlaunch -exit -nogui -nomenu || true
          echo "--- BUILD_ST.TXT ---"
          cat BUILD_ST.TXT 2>/dev/null || echo "(missing)"
          echo "--- MAKE.LOG (last 100) ---"
          tail -100 MAKE.LOG 2>/dev/null || echo "(missing)"
          echo "--- DRV_SND.LOG (last 100) ---"
          tail -100 DRV_SND.LOG 2>/dev/null || echo "(missing)"
          echo "--- DRV_NET.LOG (last 50) ---"
          tail -50 DRV_NET.LOG 2>/dev/null || echo "(missing)"
          if [ ! -f IT.EXE ]; then
            echo "::error::IT.EXE was not produced"
            exit 1
          fi
          echo "--- IT.EXE ---"
          ls -la IT.EXE
          echo "--- Sound drivers (root, *.DRV) ---"
          ls -la *.DRV 2>/dev/null || echo "(none copied)"
          echo "--- Network drivers (*.NET) ---"
          ls -la *.NET 2>/dev/null || echo "(none copied)"

      - name: Upload IT.EXE + drivers artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT-EXE-${{ github.sha }}
          path: |
            IT.EXE
            *.DRV
            *.NET
            MAKE.LOG
            DRV_SND.LOG
            DRV_NET.LOG
          if-no-files-found: warn
