name: Build IT.EXE

on:
  push:
    branches: [main]
    # Don't burn a full ~3-min DOS build on doc-only commits.
    paths-ignore:
      - '**.md'
      - '**.TXT'
      - '**.txt'
      - 'ReleaseDocumentation/**'
      - 'InternalDocumentation/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same branch/PR supersedes an in-flight build.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install DOSBox-X
        run: |
          sudo apt-get update
          sudo apt-get install -y dosbox-x unzip xvfb

      - name: Reassemble TASM toolchain from chunked secrets
        env:
          C01: ${{ secrets.TASM_TOOLCHAIN_B64_01 }}
          C02: ${{ secrets.TASM_TOOLCHAIN_B64_02 }}
          C03: ${{ secrets.TASM_TOOLCHAIN_B64_03 }}
          C04: ${{ secrets.TASM_TOOLCHAIN_B64_04 }}
          C05: ${{ secrets.TASM_TOOLCHAIN_B64_05 }}
          C06: ${{ secrets.TASM_TOOLCHAIN_B64_06 }}
          C07: ${{ secrets.TASM_TOOLCHAIN_B64_07 }}
          C08: ${{ secrets.TASM_TOOLCHAIN_B64_08 }}
          C09: ${{ secrets.TASM_TOOLCHAIN_B64_09 }}
          C10: ${{ secrets.TASM_TOOLCHAIN_B64_10 }}
          C11: ${{ secrets.TASM_TOOLCHAIN_B64_11 }}
          C12: ${{ secrets.TASM_TOOLCHAIN_B64_12 }}
          C13: ${{ secrets.TASM_TOOLCHAIN_B64_13 }}
        run: |
          if [ -z "$C01" ]; then
            echo "::error::Repo secrets TASM_TOOLCHAIN_B64_01..13 are not set."
            echo "::error::See README.md (TASM toolchain section) for setup."
            exit 1
          fi
          mkdir -p tools
          {
            printf '%s' "$C01"
            printf '%s' "$C02"
            printf '%s' "$C03"
            printf '%s' "$C04"
            printf '%s' "$C05"
            printf '%s' "$C06"
            printf '%s' "$C07"
            printf '%s' "$C08"
            printf '%s' "$C09"
            printf '%s' "$C10"
            printf '%s' "$C11"
            printf '%s' "$C12"
            printf '%s' "$C13"
          } | base64 -d > tools/tasm-toolchain.zip
          unzip -o tools/tasm-toolchain.zip -d tools/
          rm tools/tasm-toolchain.zip
          ls -la tools/

      - name: Overwrite TLINK with 3.01 (toolchain ships 7.1 which can't link drivers)
        run: |
          # CLAUDE.md: TLINK 7.1 links IT.EXE fine but fatal-errors on every
          # driver ("No program entry point") — so a build with TLINK 7.1 looks
          # green but ships ZERO drivers. Need TLINK 3.01 (53,510 bytes).
          # Public copy: nolanvenhola/zeliard2026. Mirrors the release workflow.
          mapfile -t TASM_PATHS < <(find tools -iname 'TASM.EXE' -o -iname 'tasm.exe')
          if [ ${#TASM_PATHS[@]} -eq 0 ]; then
            echo "::error::TASM.EXE not found anywhere under tools/ — secret may be corrupt"
            find tools -maxdepth 3 -printf '%p\n' | head -40
            exit 1
          fi
          TLINK_URL="https://raw.githubusercontent.com/nolanvenhola/zeliard2026/main/3_Assembly/tasm/tool/tasm201/TLINK.EXE"
          curl -fsSL -o /tmp/TLINK.EXE "$TLINK_URL"
          SIZE=$(stat -c%s /tmp/TLINK.EXE)
          if [ "$SIZE" -ne 53510 ]; then
            echo "::error::Downloaded TLINK.EXE is $SIZE bytes; expected 53510 (TLINK 3.01)"
            exit 1
          fi
          for tasm in "${TASM_PATHS[@]}"; do
            d=$(dirname "$tasm")
            cp /tmp/TLINK.EXE "$d/TLINK.EXE"
            cp /tmp/TLINK.EXE "$d/tlink.exe"
            echo "Installed TLINK 3.01 ($SIZE bytes) into $d/"
          done
          [ -f tools/TLINK.EXE ] && cp /tmp/TLINK.EXE tools/TLINK.EXE
          [ -f tools/tlink.exe ] && cp /tmp/TLINK.EXE tools/tlink.exe
          ls -la $(find tools -iname 'tlink.exe')

      - name: Write DOSBox-X build script
        run: |
          cat > build.conf <<EOF
          [sdl]
          autolock=false
          [dosbox]
          machine=svga_s3
          memsize=64
          [cpu]
          cycles=max
          [dos]
          ver=6.22
          xms=true
          ems=true
          lfn=true
          [autoexec]
          mount c $GITHUB_WORKSPACE
          mount t $GITHUB_WORKSPACE/tools
          set PATH=T:\;%PATH%
          c:
          make -f MAKEFILE.MAK > C:\MAKE.LOG
          echo IT_DONE ec=%ERRORLEVEL% > C:\BUILD_ST.TXT
          cd SoundDrivers
          call BUILDALL.BAT > C:\DRV_SND.LOG
          cd ..
          cd Network
          call BUILDALL.BAT > C:\DRV_NET.LOG
          cd ..
          echo ALL_DONE >> C:\BUILD_ST.TXT
          exit
          EOF

      - name: Build IT.EXE + drivers in DOSBox-X
        run: |
          # Need a virtual display because dosbox-x is SDL2-linked even with -nogui
          xvfb-run -a dosbox-x -conf build.conf -fastlaunch -exit -nogui -nomenu || true
          echo "--- BUILD_ST.TXT ---"
          cat BUILD_ST.TXT 2>/dev/null || echo "(missing)"
          echo "--- MAKE.LOG (last 100) ---"
          tail -100 MAKE.LOG 2>/dev/null || echo "(missing)"
          echo "--- DRV_SND.LOG (last 100) ---"
          tail -100 DRV_SND.LOG 2>/dev/null || echo "(missing)"
          echo "--- DRV_NET.LOG (last 50) ---"
          tail -50 DRV_NET.LOG 2>/dev/null || echo "(missing)"
          shopt -s nullglob nocaseglob
          if [ ! -f IT.EXE ] && [ ! -f it.exe ]; then
            echo "::error::IT.EXE was not produced"
            exit 1
          fi
          echo "--- IT.EXE ---"
          ls -la IT.EXE it.exe 2>/dev/null
          DRVS=( *.drv )
          NETS=( *.net )
          echo "--- Sound drivers: ${#DRVS[@]} found ---"
          ls -la "${DRVS[@]}" 2>/dev/null || echo "(none copied)"
          echo "--- Network drivers: ${#NETS[@]} found ---"
          ls -la "${NETS[@]}" 2>/dev/null || echo "(none copied)"
          # A green build that links IT.EXE but produces ZERO drivers is the
          # exact TLINK-7.1 trap. Fail loudly so the checkmark means something.
          if [ ${#DRVS[@]} -eq 0 ]; then
            echo "::error::No sound drivers produced — build is NOT shippable. Check TLINK version + DRV_SND.LOG."
            tail -50 DRV_SND.LOG 2>/dev/null || true
            exit 1
          fi
          if [ ${#NETS[@]} -eq 0 ]; then
            echo "::error::No network driver (.NET) produced — check DRV_NET.LOG."
            tail -50 DRV_NET.LOG 2>/dev/null || true
            exit 1
          fi

      - name: Upload IT.EXE + drivers artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT-EXE-${{ github.sha }}
          path: |
            IT.EXE
            it.exe
            *.DRV
            *.drv
            *.NET
            *.net
            MAKE.LOG
            DRV_SND.LOG
            DRV_NET.LOG
          if-no-files-found: warn
