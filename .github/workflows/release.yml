name: Package DOS release zip

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'OPTIONAL explicit tag (e.g. v2.354-2026-06-01). Leave BLANK to use v2.354 stamped with today''s date.'
        required: false
        default: ''

permissions:
  contents: write

# One release at a time; never cancel a half-finished one mid-publish.
concurrency:
  group: dos-release
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + all tags so the release notes can be built from the
          # real git log between the previous dated tag and this one. A shallow
          # clone (the default) has neither history nor tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version and create tag (manual run only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            # User typed an explicit tag — honour it verbatim.
            TAG="v${INPUT_VERSION#v}"
            echo "Using explicit tag: $TAG"
          else
            # No input — the version is ALWAYS v2.354, distinguished only by
            # today's date (year-month-day). Zero typing: press Run workflow,
            # leave the field blank, and you get v2.354-<today>.
            DATE=$(date -u +%Y-%m-%d)
            TAG="v2.354-$DATE"
            echo "Dated release tag: $TAG"
          fi
          echo "Target tag: $TAG at $GITHUB_SHA"
          # If this exact tag already exists, delete its release + tag so the
          # new build replaces it cleanly (only happens on an explicit re-run).
          if gh release view --repo "$GITHUB_REPOSITORY" "$TAG" >/dev/null 2>&1; then
            echo "Existing release $TAG found — deleting it"
            gh release delete --repo "$GITHUB_REPOSITORY" "$TAG" --yes --cleanup-tag || true
          fi
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Stale tag $TAG still present — deleting"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Impulse Tracker $TAG (esaruoho fork)"
          git push origin "$TAG"
          echo "RESOLVED_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Install DOSBox-X
        run: |
          sudo apt-get update
          sudo apt-get install -y dosbox-x unzip xvfb zip

      - name: Reassemble TASM toolchain from chunked secrets
        env:
          C01: ${{ secrets.TASM_TOOLCHAIN_B64_01 }}
          C02: ${{ secrets.TASM_TOOLCHAIN_B64_02 }}
          C03: ${{ secrets.TASM_TOOLCHAIN_B64_03 }}
          C04: ${{ secrets.TASM_TOOLCHAIN_B64_04 }}
          C05: ${{ secrets.TASM_TOOLCHAIN_B64_05 }}
          C06: ${{ secrets.TASM_TOOLCHAIN_B64_06 }}
          C07: ${{ secrets.TASM_TOOLCHAIN_B64_07 }}
          C08: ${{ secrets.TASM_TOOLCHAIN_B64_08 }}
          C09: ${{ secrets.TASM_TOOLCHAIN_B64_09 }}
          C10: ${{ secrets.TASM_TOOLCHAIN_B64_10 }}
          C11: ${{ secrets.TASM_TOOLCHAIN_B64_11 }}
          C12: ${{ secrets.TASM_TOOLCHAIN_B64_12 }}
          C13: ${{ secrets.TASM_TOOLCHAIN_B64_13 }}
        run: |
          if [ -z "$C01" ]; then
            echo "::error::Repo secrets TASM_TOOLCHAIN_B64_01..13 are not set."
            echo "::error::See README.md (TASM toolchain section) for setup."
            exit 1
          fi
          mkdir -p tools
          {
            printf '%s' "$C01"; printf '%s' "$C02"; printf '%s' "$C03"
            printf '%s' "$C04"; printf '%s' "$C05"; printf '%s' "$C06"
            printf '%s' "$C07"; printf '%s' "$C08"; printf '%s' "$C09"
            printf '%s' "$C10"; printf '%s' "$C11"; printf '%s' "$C12"
            printf '%s' "$C13"
          } | base64 -d > tools/tasm-toolchain.zip
          unzip -o tools/tasm-toolchain.zip -d tools/
          rm tools/tasm-toolchain.zip

      - name: Overwrite TLINK with 3.01 (toolchain ships 7.1 which can't link drivers)
        run: |
          # CLAUDE.md: TLINK 7.1 links IT.EXE fine but fatal-errors on every
          # driver ("No program entry point"). Need TLINK 3.01 (53,510 bytes).
          # Public copy: nolanvenhola/zeliard2026.
          # Find wherever TASM/MAKE got placed and replace TLINK.EXE next to them.
          mapfile -t TASM_PATHS < <(find tools -iname 'TASM.EXE' -o -iname 'tasm.exe')
          if [ ${#TASM_PATHS[@]} -eq 0 ]; then
            echo "::error::TASM.EXE not found anywhere under tools/ — secret may be corrupt"
            find tools -maxdepth 3 -printf '%p\n' | head -40
            exit 1
          fi
          TLINK_URL="https://raw.githubusercontent.com/nolanvenhola/zeliard2026/main/3_Assembly/tasm/tool/tasm201/TLINK.EXE"
          curl -fsSL -o /tmp/TLINK.EXE "$TLINK_URL"
          SIZE=$(stat -c%s /tmp/TLINK.EXE)
          if [ "$SIZE" -ne 53510 ]; then
            echo "::error::Downloaded TLINK.EXE is $SIZE bytes; expected 53510 (TLINK 3.01)"
            exit 1
          fi
          for tasm in "${TASM_PATHS[@]}"; do
            d=$(dirname "$tasm")
            # Cover both upper and lower case so the case-sensitive Linux fs and
            # DOSBox-X 8.3 lookup both find it.
            cp /tmp/TLINK.EXE "$d/TLINK.EXE"
            cp /tmp/TLINK.EXE "$d/tlink.exe"
            echo "Installed TLINK 3.01 ($SIZE bytes) into $d/"
          done
          # Sanity: any flat tools/TLINK.EXE also gets overwritten
          [ -f tools/TLINK.EXE ] && cp /tmp/TLINK.EXE tools/TLINK.EXE
          [ -f tools/tlink.exe ] && cp /tmp/TLINK.EXE tools/tlink.exe
          ls -la $(find tools -iname 'tlink.exe')

      - name: Write DOSBox-X build script
        run: |
          cat > build.conf <<EOF
          [sdl]
          autolock=false
          [dosbox]
          machine=svga_s3
          memsize=64
          [cpu]
          cycles=max
          [dos]
          ver=6.22
          xms=true
          ems=true
          lfn=true
          [autoexec]
          mount c $GITHUB_WORKSPACE
          mount t $GITHUB_WORKSPACE/tools
          set PATH=T:\;%PATH%
          c:
          make -f MAKEFILE.MAK > C:\MAKE.LOG
          echo IT_DONE ec=%ERRORLEVEL% > C:\BUILD_ST.TXT
          cd SoundDrivers
          call BUILDALL.BAT > C:\DRV_SND.LOG
          cd ..
          cd Network
          call BUILDALL.BAT > C:\DRV_NET.LOG
          cd ..
          echo ALL_DONE >> C:\BUILD_ST.TXT
          exit
          EOF

      - name: Build IT.EXE + drivers in DOSBox-X
        run: |
          xvfb-run -a dosbox-x -conf build.conf -fastlaunch -exit -nogui -nomenu || true
          shopt -s nullglob nocaseglob
          if [ ! -f IT.EXE ] && [ ! -f it.exe ]; then
            echo "::error::IT.EXE was not produced. See MAKE.LOG."
            tail -100 MAKE.LOG 2>/dev/null || true
            exit 1
          fi
          DRVS=( *.drv )
          NETS=( *.net )
          echo "Found ${#DRVS[@]} driver(s), ${#NETS[@]} network driver(s)"
          ls -la IT.EXE it.exe ${DRVS[@]} ${NETS[@]} 2>/dev/null || true
          if [ ${#DRVS[@]} -eq 0 ]; then
            echo "::error::No sound drivers produced. Diagnostics follow."
            echo "--- SoundDrivers/ contents (post-build) ---"
            ls -la SoundDrivers/ | head -80
            echo "--- DRV_SND.LOG (full) ---"
            cat DRV_SND.LOG 2>/dev/null || echo "(no DRV_SND.LOG)"
            echo "--- MAKE.LOG tail ---"
            tail -50 MAKE.LOG 2>/dev/null || echo "(no MAKE.LOG)"
            echo "--- BUILD_ST.TXT ---"
            cat BUILD_ST.TXT 2>/dev/null || echo "(no BUILD_ST.TXT)"
            echo "--- tools/ TLINK version check ---"
            ls -la tools/TLINK* tools/tlink* 2>/dev/null || echo "(no TLINK in tools/)"
            exit 1
          fi

      - name: Determine release name
        id: name
        run: |
          if [ -n "$RESOLVED_TAG" ]; then
            NAME="IT-$RESOLVED_TAG"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            NAME="IT-${GITHUB_REF#refs/tags/}"
          else
            NAME="IT-esaruoho-${GITHUB_SHA::7}"
          fi
          # DOS-friendly: uppercase, strip anything weird
          NAME=$(echo "$NAME" | tr '[:lower:]' '[:upper:]' | tr -c 'A-Z0-9.-' '-' | sed 's/--*/-/g; s/^-//; s/-$//')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Release name: $NAME"

      - name: Stage DOS distribution
        id: stage
        run: |
          NAME="${{ steps.name.outputs.name }}"
          STAGE="dist/$NAME"
          mkdir -p "$STAGE"
          shopt -s nullglob nocaseglob

          # Core program — copy as uppercase IT.EXE regardless of source case
          for f in IT.EXE it.exe; do [ -f "$f" ] && cp "$f" "$STAGE/IT.EXE" && break; done

          # Drivers — case-insensitive glob (DOSBox-X case varies); strip extension
          # case-insensitively and re-emit uppercase NAME.DRV for DOS PCs.
          for f in *.drv; do
            base="${f%.*}"
            UP=$(echo "$base" | tr '[:lower:]' '[:upper:]')
            cp "$f" "$STAGE/$UP.DRV"
          done
          for f in *.net; do
            base="${f%.*}"
            UP=$(echo "$base" | tr '[:lower:]' '[:upper:]')
            cp "$f" "$STAGE/$UP.NET"
          done

          DRVCOUNT=$(ls "$STAGE"/*.DRV 2>/dev/null | wc -l)
          NETCOUNT=$(ls "$STAGE"/*.NET 2>/dev/null | wc -l)
          echo "Staged $DRVCOUNT sound drivers, $NETCOUNT network drivers"
          if [ "$DRVCOUNT" -eq 0 ]; then
            echo "::error::No .DRV files reached the staging directory"
            exit 1
          fi

          # Default config (committed to repo root)
          [ -f ITMIDI.CFG ] && cp ITMIDI.CFG "$STAGE/"

          # Release documentation — flat in root, mirroring original IT215.zip layout
          cp ReleaseDocumentation/*.TXT "$STAGE/" 2>/dev/null || true
          cp ReleaseDocumentation/*.FAQ "$STAGE/" 2>/dev/null || true
          cp ReleaseDocumentation/FILE_ID.DIZ "$STAGE/" 2>/dev/null || true
          cp ReleaseDocumentation/IT256.ICO "$STAGE/" 2>/dev/null || true

          # Tutorial subset
          if [ -d Tutorial ]; then
            mkdir -p "$STAGE/TUTORIAL"
            cp Tutorial/IT_TUTORIAL.EXE "$STAGE/TUTORIAL/" 2>/dev/null || true
            cp Tutorial/TUTE.IT "$STAGE/TUTORIAL/" 2>/dev/null || true
          fi

          # VSound (Windows 9x VxD MIDI helper) — ship if present, as original did
          if [ -d VSound ]; then
            mkdir -p "$STAGE/VSOUND"
            cp -r VSound/. "$STAGE/VSOUND/" 2>/dev/null || true
          fi

          # Keyboard layout sources
          if [ -d Keyboard ]; then
            mkdir -p "$STAGE/KEYBOARD"
            cp Keyboard/*.ASM Keyboard/*.TXT "$STAGE/KEYBOARD/" 2>/dev/null || true
          fi

          # Build manifest — provenance + this fork's feature list
          BUILT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "Impulse Tracker (esaruoho fork) — DOS distribution"
            echo "=================================================="
            echo
            echo "Release   : $NAME"
            echo "Commit    : $GITHUB_SHA"
            echo "Ref       : $GITHUB_REF"
            echo "Built     : $BUILT"
            echo "Source    : https://github.com/esaruoho/impulse-tracker"
            echo "Upstream  : https://github.com/jthlim/impulse-tracker (read-only)"
            echo "Toolchain : TASM 4.1 / TLINK 3.01 / Borland MAKE 4.0 under DOSBox-X"
            echo
            echo "Fork features over upstream IT 2.15:"
            echo "  - External MIDI sync: Start/Stop/Continue + F8 Clock tempo"
            echo "  - Driver-level F8-FF passthrough across 16 sound drivers"
            echo "  - Ctrl-O WAV render + auto-import (Paketti-style P3)"
            echo "  - F3 sample-loader keyjazz hang fix (MIDISyncLoaderSuppress)"
            echo "  - Alt-R Replicate at Cursor (Paketti port), Shift-Alt-R = ClearViews"
            echo "  - Quicksave folder, F12 Module Directory picker"
            echo "  - Shift-F1 MIDI Monitor screen"
            echo
            echo "Installation"
            echo "------------"
            echo "Copy the whole folder onto your DOS PC (or DOSBox-X mount), CD into it,"
            echo "and run IT.EXE. Sound + network drivers (.DRV / .NET) must live alongside"
            echo "IT.EXE so the runtime loader can find them."
            echo
            echo "License: BSD-3-Clause. See README.TXT and IT.TXT."
          } > "$STAGE/BUILD.TXT"

          # File list
          ( cd "$STAGE" && ls -la ) > "$STAGE/PACKAGED.TXT"

          # DOS/Windows render LF-only text as a wall of junk. Every text file in
          # the zip MUST be CRLF. The committed docs (IT.TXT etc.) already are,
          # but BUILD.TXT / PACKAGED.TXT are generated here with bash (LF). Force
          # CRLF on every text-ish file. 's/\r*$/\r/' collapses 0+ trailing CRs to
          # exactly one, so it is safe to run on already-CRLF files (no doubling).
          find "$STAGE" -type f \
            \( -iname '*.TXT' -o -iname '*.DIZ' -o -iname '*.FAQ' -o -iname '*.NFO' -o -iname '*.CFG' \) \
            -print0 | while IFS= read -r -d '' f; do
              sed -i 's/\r*$/\r/' "$f"
            done

          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "--- Staged contents ---"
          find "$STAGE" -maxdepth 2 -print

      - name: Create zip
        id: zip
        run: |
          NAME="${{ steps.name.outputs.name }}"
          STAGE="${{ steps.stage.outputs.stage }}"
          ZIP="$NAME.zip"
          # Zip from inside dist/ so the archive contains a single top-level NAME/ folder
          ( cd dist && zip -r "../$ZIP" "$NAME" )
          ls -la "$ZIP"
          unzip -l "$ZIP" | head -60
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ steps.name.outputs.name || github.sha }}
          path: |
            MAKE.LOG
            DRV_SND.LOG
            DRV_NET.LOG
            BUILD_ST.TXT
          if-no-files-found: warn

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.name }}
          path: ${{ steps.zip.outputs.zip }}
          if-no-files-found: error

      - name: Generate release notes from direct commits
        if: startsWith(github.ref, 'refs/tags/') || env.RESOLVED_TAG != ''
        run: |
          set -euo pipefail
          # This fork ships via DIRECT COMMITS to main, not PRs. GitHub's
          # built-in generate_release_notes is PR-centric, so it surfaces a
          # single stale PR (#3, "WIP DO NOT MERGE") and hides every real
          # commit. Build "What's Changed" from the actual commit list between
          # the previous dated release tag and this build instead.
          if [ -n "${RESOLVED_TAG:-}" ]; then
            TAG="$RESOLVED_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Previous DATED release tag (v*-*, so the rolling bare "v2.354" is
          # ignored), newest first, excluding the tag we're publishing now.
          PREV_TAG=$(git tag --list 'v*-*' --sort=-creatordate | grep -vxF "$TAG" | head -1 || true)
          echo "TAG=$TAG  PREV_TAG=${PREV_TAG:-<none>}"
          {
            echo "## What's Changed"
            echo
            echo "Direct commits to \`main\` since ${PREV_TAG:-the start}:"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG..HEAD" --no-merges --pretty=format:'- %s (`%h`)'
              printf '\n\n'
              echo "**Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/$PREV_TAG...$TAG"
            else
              git log --no-merges -n 50 --pretty=format:'- %s (`%h`)'
              printf '\n'
            fi
          } > RELEASE_NOTES.md
          echo "--- RELEASE_NOTES.md ---"
          cat RELEASE_NOTES.md

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || env.RESOLVED_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RESOLVED_TAG }}
          files: ${{ steps.zip.outputs.zip }}
          # Our own commit-derived notes — NOT generate_release_notes (PR-centric)
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
